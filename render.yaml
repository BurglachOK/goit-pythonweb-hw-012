services:
  # 1. FastAPI Web Service
  - type: web
    name: premium-contacts-api
    runtime: docker
    repo: https://github.com/BurglachOK/goit-pythonweb-hw-012
    plan: free
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contacts-postgres
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: contacts-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: contacts-redis
          property: port
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ADMIN_REGISTRATION_TOKEN
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # 2. Redis Cache Service
  - type: redis
    name: contacts-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # 3. PostgreSQL Database Service
  - name: contacts-postgres
    plan: free
    region: frankfurt
    databaseName: contacts_db
    user: contacts_user